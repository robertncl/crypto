version: 2
updates:
  # Go modules (backend service).
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      go-dependencies:
        patterns: ["*"]

  # npm packages (web SPA).
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-dependencies:
        patterns: ["*"]

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Base images referenced by the Dockerfile.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
