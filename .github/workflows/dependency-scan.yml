name: Dependency Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '17 4 * * 1' # weekly, Monday 04:17 UTC

permissions:
  contents: read

jobs:
  govulncheck:
    name: Go vulnerabilities (govulncheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # govulncheck reports only vulnerabilities actually reachable from the
      # code, so failing the build on a finding is high-signal.
      - name: Run govulncheck
        run: govulncheck ./...

  npm-audit:
    name: npm audit (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Reported for visibility; transitive dev-dependency advisories are common
      # and shouldn't hard-block merges (Dependabot opens fix PRs separately).
      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true
