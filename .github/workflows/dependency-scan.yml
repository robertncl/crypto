name: Dependency Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '17 4 * * 1' # weekly, Monday 04:17 UTC

permissions:
  contents: read

jobs:
  govulncheck:
    name: Go vulnerabilities (govulncheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # govulncheck reports only vulnerabilities actually reachable from the
      # code, so failing the build on a finding is high-signal.
      - name: Run govulncheck
        run: govulncheck ./...

  npm-audit:
    name: npm audit (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Reported for visibility; transitive dev-dependency advisories are common
      # and shouldn't hard-block merges (Dependabot opens fix PRs separately).
      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true
